// --- 2. Centralized Icon Management (Safe & Optimized) ---
useEffect(() => {
    const rootNode = document.getElementById('root');
    if (!rootNode || !window.lucide) return;

    // Initial run
    window.lucide.createIcons();

    const observer = new MutationObserver((mutations) => {
        // Check if any added nodes actually contain an <i> tag with data-lucide
        const hasNewIcons = mutations.some(mutation => 
            Array.from(mutation.addedNodes).some(node => 
                node.nodeType === 1 && (node.querySelector('[data-lucide]') || node.hasAttribute('data-lucide'))
            )
        );

        if (hasNewIcons) {
            // DISCONNECT to prevent the infinite loop while Lucide modifies the DOM
            observer.disconnect();
            
            window.lucide.createIcons();
            
            // RECONNECT after Lucide is done
            observer.observe(rootNode, { childList: true, subtree: true });
        }
    });

    observer.observe(rootNode, { childList: true, subtree: true });

    return () => observer.disconnect();
}, []);

// 2. Weather Fetching Logic (Optimized for Speed)
const fetchRouteWeather = async (waypoints) => {
    // ONLY fetch if we don't already have this location's data in state
    const fetchList = waypoints.filter(wp => !weatherData[wp.place_name]);
    
    if (fetchList.length === 0) return;

    try {
        // Fetch all needed weather data concurrently
        const weatherPromises = fetchList.map(async (wp) => {
            const response = await fetch(
                `https://api.openweathermap.org/data/2.5/forecast?lat=${wp.latitude}&lon=${wp.longitude}&units=metric&appid=${WEATHER_KEY}`
            );
            const data = await response.json();
            
            if (data.list && data.list.length >= 9) {
                return {
                    name: wp.place_name,
                    data: {
                        current: Math.round(data.list[0].main.temp),
                        currentCond: data.list[0].weather[0].main,
                        nextDay: Math.round(data.list[8].main.temp),
                        nextCond: data.list[8].weather[0].main
                    }
                };
            }
            return null;
        });

        // Wait for all fetches to complete
        const results = await Promise.all(weatherPromises);
        
        // Build the new state object
        const newWeatherData = {};
        results.forEach(res => {
            if (res) newWeatherData[res.name] = res.data;
        });

        // Batch update state once
        if (Object.keys(newWeatherData).length > 0) {
            setWeatherData(prev => ({ ...prev, ...newWeatherData }));
        }
    } catch (error) {
        console.error("Weather fetch failed", error);
    }
};

      const getInteractionMetadata = async () => {
    const providers = [
        'https://ipapi.co/json/',
        'https://demo.ip-api.com/json/?fields=city,country',
        'https://api.db-ip.com/v2/free/self'
    ];

    for (const url of providers) {
        try {
            const response = await fetch(url);
            if (response.ok) {
                const data = await response.json();
                return {
                    city: data.city || 'Unknown',
                    // Added data.countryName to catch the DB-IP provider response
                    country: data.country_name || data.countryName || data.country || 'Unknown' 
                };
            }
        } catch (e) {
            console.warn(`Geo provider ${url} failed, trying next...`);
        }
    }
    return { city: 'Unknown', country: 'Unknown' };
};

      const getUserLocation = () => {
    if (!navigator.geolocation) {
        setUserCoords(DEFAULT_LOCATION);
        return;
    }

    
    const watchId = navigator.geolocation.watchPosition(
        (pos) => {
            const newCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            setUserCoords(newCoords);
            console.log("GPS Updated:", newCoords);
        },
        (err) => {
            console.warn("GPS Warning:", err.message);
            if (!userCoords) setUserCoords(DEFAULT_LOCATION);
        },
        { 
            enableHighAccuracy: true, // REQUIRED FOR ACCURACY
            timeout: 10000, 
            maximumAge: 0 
        }
    );
    return watchId;
};
        
        const toggleRoutePlace = (place) => {
    setSelectedRoute(prev => {
        // 1. Add or remove the place from the selection pool
        const isSelected = prev.find(p => p.id === place.id);
        const selectionPool = isSelected 
            ? prev.filter(p => p.id !== place.id) 
            : [...prev, place];

        if (selectionPool.length === 0) return [];
        if (!userCoords) return selectionPool; // Fallback if GPS is off

        // 2. Sequential Reordering (Nearest Neighbor)
        const optimizedRoute = [];
        let remainingOptions = [...selectionPool];
        
        // Always start the calculation from the user's current position
        let currentPoint = { lat: userCoords.lat, lng: userCoords.lng };

        while (remainingOptions.length > 0) {
            let nearestIndex = 0;
            let shortestDistance = Infinity;

            for (let i = 0; i < remainingOptions.length; i++) {
                const distance = calculateDistance(
                    currentPoint.lat, 
                    currentPoint.lng, 
                    remainingOptions[i].latitude, 
                    remainingOptions[i].longitude
                );

                if (distance < shortestDistance) {
                    shortestDistance = distance;
                    nearestIndex = i;
                }
            }

            // Move the closest location found to the optimized list
            const nextStop = remainingOptions.splice(nearestIndex, 1)[0];
            optimizedRoute.push(nextStop);

            // Update current point to the location we just "arrived" at
            currentPoint = { lat: nextStop.latitude, lng: nextStop.longitude };
        }

        return optimizedRoute;
    });
};

                           parseFloat(p.latitude).toFixed(4) === latFixed &&

const calculateDistance = (lat1, lon1, lat2, lon2) => {
    const R = 6371; // Radius of the earth in km
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = 
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
};

const displayPlaces = React.useMemo(() => {
    // 1. FILTERING LOGIC
    const filtered = places.filter(place => {
        const matchesStatus = place.status === statusFilter;
        const matchesCategory = filterTag === 'All' || place.category === filterTag;
        
        const name = (place.place_name || "").toLowerCase();
        const district = (place.district || "").toLowerCase();
        const search = (searchTerm || "").toLowerCase();
        
        const matchesSearch = name.includes(search) || district.includes(search);
        
        return matchesStatus && matchesCategory && matchesSearch;
    });

    // 2. SORTING LOGIC (Refined for Accuracy)
    return filtered.sort((a, b) => {
        // Sort by ID (Newest First)
        if (sortBy === 'recent') {
            return b.id - a.id;
        }

        // Sort by Distance (Nearest First)
        // Ensure userCoords is available before attempting calculation
        if (sortBy === 'distance' && userCoords && userCoords.lat && userCoords.lng) {
            const distA = calculateDistance(userCoords.lat, userCoords.lng, a.latitude, a.longitude);
            const distB = calculateDistance(userCoords.lat, userCoords.lng, b.latitude, b.longitude);
            
            // Handle edge cases where distance might be NaN
            if (isNaN(distA) || isNaN(distB)) return 0;
            
            return distA - distB;
        }

        // Default: Sort by Place Name alphabetically if no other sort is active
        return (a.place_name || "").localeCompare(b.place_name || "");
    });
}, [places, statusFilter, filterTag, searchTerm, sortBy, userCoords]);

                                        onClick={() => toggleRoutePlace(place)}
                                        className={`w-9 h-9 rounded-xl flex items-center justify-center transition-all active:scale-90 ${
                                            isSelected 
                                                ? 'bg-slate-900 text-white shadow-lg shadow-slate-900/20' 
                                                : 'bg-slate-100 text-slate-400 hover:bg-indigo-500 hover:text-white'
                                        }`}
                                    >
                                        <i data-lucide={isSelected ? "minus" : "plus"} className="w-4 h-4"></i>
                                    </button>
                                </div>
                            );
                        });
                    })()}
                </div>

                {/* Footer Action */}
                <div className="p-4 border-t border-slate-100 bg-slate-50/50 shrink-0">
                    <div className="flex gap-2">
                        <button 
                            onClick={() => {
                                if (selectedRoute.length === 0) return;
                                // Calls the function where QRCode.CorrectLevel.H fix was applied
                                showQRCode(selectedRoute, "Expedition Route");
                            }}
                            disabled={selectedRoute.length === 0}
                            className={`flex-1 py-4 rounded-2xl font-black uppercase text-[10px] flex items-center justify-center gap-2 transition-all active:scale-[0.95] ${
                                selectedRoute.length > 0 ? 'bg-slate-900 text-white shadow-lg shadow-slate-900/20 hover:bg-slate-800' : 'bg-slate-200 text-slate-400 cursor-not-allowed'
                            }`}
                        >
                            <i data-lucide="qr-code" className="w-4 h-4"></i>
                            Generate QR & Share
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
)}

{isAddOpen && (
    <div className="fixed inset-0 bg-white z-[3000] flex flex-col lg:flex-row animate-in fade-in duration-300">
        {/* Map Side */}
        <div className="w-full lg:w-1/2 h-[35vh] lg:h-full bg-slate-100 relative">
            <div id="add-verification-map" className="w-full h-full"></div> 
            {/* The ID above must match the JS exactly */}
            <div className="absolute top-6 left-6 z-[3001] bg-white p-4 rounded-2xl shadow-xl border border-slate-100">
                <p className="text-[10px] font-black uppercase text-slate-400">Database Preview</p>
                <p className="text-xs font-bold">Verifying location proximity...</p>
            </div>
        </div>

        {/* Form Side */}
<div className="w-full lg:w-1/2 p-8 overflow-y-auto">
    <div className="flex justify-between items-center mb-8">
        <div>
            <h2 className="text-2xl font-black uppercase tracking-tighter">Suggest a Spot</h2>
            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Staging for Admin Review</p>
        </div>
        <button onClick={() => setisAddOpen(false)} className="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center hover:bg-slate-200">
            <i data-lucide="x" className="w-5 h-5 text-slate-500"></i>
        </button>
    </div>
    
    <form onSubmit={handleAddPlace} className="space-y-6">
        <div className="space-y-2">
            <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Location Search</label>
            <div className="relative">
                <i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                <input 
    id="location-search"
    type="text" 
    required
    placeholder="Search Google Maps..."
    onKeyDown={(e) => {
        // Prevents the form from submitting when you press Enter to select a map suggestion
        if (e.key === 'Enter') e.preventDefault(); 
    }}
    className="w-full pl-12 pr-4 py-4 rounded-2xl border border-slate-100 bg-slate-50 focus:bg-white focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all font-medium"
/>
            </div>
            <p className="text-[9px] text-slate-400 italic ml-1">Coordinates and District are fetched automatically upon selection.</p>
        </div>

        <div className="space-y-2">
            <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Category</label>
            <select 
                value={formData.category}
                onChange={(e) => setFormData({...formData, category: e.target.value})}
                className="w-full p-4 rounded-2xl border border-slate-100 bg-slate-50 outline-none font-medium appearance-none focus:ring-4 focus:ring-indigo-500/10"
            >
                {["Waterfall", "Mountain", "Trail", "Viewpoint", "Beach", "Park", "Plateaus", "Reserved Forest", "Monastery", "Archaeology", "Reservoir", "Pool", "Stream", "Location"].map(cat => (
                    <option key={cat} value={cat}>{cat}</option>
                ))}
            </select>
        </div>

        <button type="submit" className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase text-[11px] tracking-[0.2em] shadow-xl shadow-slate-900/20 hover:bg-indigo-600 transition-all active:scale-[0.98]">
            Submit Suggestion
        </button>
    </form>
</div>

    </div>
)}

{activeId && (
    <PhotoGallery 
        key={activeId} 
        photos={places.find(p => p.id === activeId)?.album_photos || []} 
        onClose={() => setActiveId(null)} 
    />
)}

<PrivacyModal isOpen={isPrivacyOpen} onClose={() => setIsPrivacyOpen(false)} />

        </div>
      );
     }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
