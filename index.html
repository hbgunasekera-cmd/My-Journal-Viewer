    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventure Journal - Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; overflow: hidden; user-select: none; }
        .scrollable-list::-webkit-scrollbar { width: 6px; }
        .scrollable-list::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        .text-shadow { text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="h-screen flex flex-col">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SUPABASE_URL = 'https://vpslgikpaintiuayajmx.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_rsbN_QlROV14EEzYjl9dTQ_Jxl-ra44';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const DEFAULT_LOCATION = { lat: 7.0777, lng: 79.8924 };
        const VALID_CATEGORIES = ["Waterfall", "Mountain", "Trail", "Viewpoint", "Beach", "Park", "Plateaus", "Reserved Forest", "Monastery", "Archaeology", "Reservoir", "Pool", "Stream", "Location"];

        const auditLocationName = (name) => {
            if (!name) return "";
            return name.replace(/[0-9]/g, "").replace(/[^\x00-\x7F]/g, "").replace(/[^a-zA-Z\s]/g, "").replace(/\s+/g, " ").trim().toLowerCase().split(" ").map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(" ");
        };

        function App() {
            const [places, setPlaces] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterTag, setFilterTag] = useState('All');
            const [sortBy, setSortBy] = useState('recent');
            const [userCoords, setUserCoords] = useState(null);
            const [isFilterOpen, setIsFilterOpen] = useState(false);
            const [viewingArticle, setViewingArticle] = useState(null);
            const [isArticleOpen, setIsArticleOpen] = useState(false);

            useEffect(() => { 
                fetchPlaces(); 
                getUserLocation();
                logVisit();
            }, []);

            useEffect(() => { 
    if (window.lucide) window.lucide.createIcons(); 
}, [places, searchTerm, filterTag, sortBy, isArticleOpen]);

            const logVisit = async () => {
                try {
                    await supabaseClient.from('page_visits').insert([{ page_path: 'adventure_journal_index', user_agent: navigator.userAgent }]);
                } catch (e) { console.log("Visit log skipped"); }
            };

            const getUserLocation = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => setUserCoords({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                        () => setUserCoords(DEFAULT_LOCATION)
                    );
                } else {
                    setUserCoords(DEFAULT_LOCATION);
                }
            };

            const fetchPlaces = async () => {
                const { data, error } = await supabaseClient.from('travel_bucket_list').select('*').eq('status', 'done').order('created_at', { ascending: false });
                setPlaces(data || []);
            };

            const calculateDistance = (lat2, lon2) => {
                const ref = userCoords || DEFAULT_LOCATION;
                const R = 6371; 
                const dLat = (lat2 - ref.lat) * Math.PI / 180;
                const dLon = (lon2 - ref.lng) * Math.PI / 180;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(ref.lat * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
                return (R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)))).toFixed(1);
            };
            
            

            const filteredAndSortedPlaces = useMemo(() => {
                let filtered = [...places];
                if (searchTerm.trim() !== "") filtered = filtered.filter(p => p.place_name.toLowerCase().includes(searchTerm.toLowerCase()));
                if (filterTag !== 'All') filtered = filtered.filter(p => p.category === filterTag);
                return filtered.sort((a, b) => sortBy === 'distance' ? parseFloat(calculateDistance(a.latitude, a.longitude)) - parseFloat(calculateDistance(b.latitude, b.longitude)) : new Date(b.created_at) - new Date(a.created_at));
            }, [places, searchTerm, filterTag, sortBy, userCoords]);

            return (
                <div className="h-full flex flex-col max-w-7xl mx-auto">
                    <header className="p-4 md:px-10 md:pt-8 md:pb-4 flex justify-between items-center bg-white md:bg-transparent border-b md:border-none">
    <div className="flex items-center gap-4">
        {/* Colorful & Elegant Compass Icon Container */}
        <div className="relative p-2.5 bg-slate-900 rounded-2xl shadow-lg flex items-center justify-center overflow-hidden group">
            {/* Subtle background glow */}
            <div className="absolute inset-0 bg-gradient-to-tr from-orange-500/20 to-yellow-400/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
            
            <i data-lucide="compass" 
               className="w-6 h-6 md:w-7 md:h-7 stroke-[2.5px]" 
               style={{
                   stroke: "url(#compass-gradient)",
                   filter: "drop-shadow(0 0 2px rgba(251, 191, 36, 0.4))"
               }}>
            </i>

            {/* SVG Gradient Definition */}
            <svg width="0" height="0" style={{ position: 'absolute' }}>
                <defs>
                    <linearGradient id="compass-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style={{ stopColor: '#FBBF24' }} /> {/* Yellow-400 */}
                        <stop offset="100%" style={{ stopColor: '#F97316' }} /> {/* Orange-500 */}
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <div>
            <h1 className="text-xl md:text-3xl font-black italic text-slate-900 uppercase tracking-tighter leading-none">
                Adventure Log
            </h1>
            <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">
                Shared Feed
            </p>
        </div>
    </div>

    <button onClick={() => setIsFilterOpen(true)} className="flex items-center gap-2 bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase md:hidden shadow-md">
        <i data-lucide="sliders-horizontal" className="w-3 h-3 text-orange-400"></i>
        Filters
    </button>
</header>

                    {/* RESTORED: Desktop Filter Bar */}
                    <div className="hidden md:block bg-white p-5 mx-10 rounded-3xl shadow-xl border mb-6">
                        <div className="flex gap-3 mb-4">
                            <input value={searchTerm} onChange={e => setSearchTerm(e.target.value)} placeholder="Search destinations..." className="flex-1 px-4 py-3 rounded-xl bg-slate-50 font-bold text-xs outline-none" />
                            <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="px-4 py-3 rounded-xl bg-slate-900 text-white font-black uppercase text-[9px] outline-none">
                                <option value="recent">Newest First</option>
                                <option value="distance">Nearest First</option>
                            </select>
                        </div>
                        <div className="flex flex-wrap gap-2">
                           {['All', ...VALID_CATEGORIES].map(tag => (
                                <button key={tag} onClick={() => setFilterTag(tag)} className={`px-3 py-1.5 rounded-lg text-[9px] font-black uppercase transition-all ${filterTag === tag ? 'bg-slate-900 text-white shadow-lg' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}>{tag}</button>
                            ))}
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto px-4 md:px-10 pb-20 scrollable-list">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6 pt-2">
                            {filteredAndSortedPlaces.map(place => (
                                <div key={place.id} className="group relative rounded-[2rem] bg-white border border-slate-100 overflow-hidden flex flex-col shadow-sm transition-all hover:shadow-xl">
                                    <div className="h-40 md:h-48 w-full relative bg-slate-100 overflow-hidden">
                                        {place.cover_photo_url && <img src={place.cover_photo_url} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />}
                                        <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                                        <div className="absolute bottom-3 left-4 pr-4">
                                            <h3 className="text-white text-xs md:text-sm font-extrabold text-shadow leading-tight uppercase tracking-tight">{auditLocationName(place.place_name)}</h3>
                                        </div>
                                    </div>
                                    <div className="p-4 flex flex-col flex-1">
                                        <div className="flex justify-between items-center mb-4 text-[8px] font-black text-slate-400 uppercase tracking-widest">
                                            <span>{calculateDistance(place.latitude, place.longitude)} KM</span>
                                            <span className="bg-slate-50 text-slate-500 px-2 py-0.5 rounded border border-slate-100">{place.category}</span>
                                        </div>
                                        <div className="grid grid-cols-3 gap-2 mt-auto">
                                            <button 
    onClick={() => {
        // Use the database URL if it exists, otherwise fallback to a lat/lng search
        const mapsUrl = place.google_maps_url || `https://www.google.com/maps/search/?api=1&query=${place.latitude},${place.longitude}`;
        window.open(mapsUrl, '_blank');
    }} 
    className="py-2.5 rounded-xl bg-slate-50 text-slate-600 text-[8px] font-black uppercase border border-slate-100"
>
    Maps
</button>
                                            <button onClick={() => window.open(place.photo_album_url, '_blank')} disabled={!place.photo_album_url} className={`py-2.5 rounded-xl text-[8px] font-black uppercase ${place.photo_album_url ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-50 text-slate-200 cursor-not-allowed'}`}>Album</button>
                                            {place.ai_article && (
                                                <button onClick={() => { setViewingArticle(place); setIsArticleOpen(true); }} className="py-2.5 rounded-xl bg-emerald-600 text-white text-[8px] font-black uppercase shadow-md animate-pulse">Read</button>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Mobile Filter Modal */}
                    {isFilterOpen && (
                        <div className="fixed inset-0 z-50 md:hidden">
                            <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={() => setIsFilterOpen(false)}></div>
                            <div className="absolute bottom-0 left-0 right-0 bg-white rounded-t-[2.5rem] p-6 shadow-2xl max-h-[85vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-sm font-black uppercase text-slate-900 tracking-widest">Filters</h2>
                                    <button onClick={() => setIsFilterOpen(false)} className="p-2 bg-slate-100 rounded-full"><i data-lucide="x" className="w-4 h-4"></i></button>
                                </div>
                                <div className="space-y-6">
                                    <section>
                                        <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-2">Search</label>
                                        <input value={searchTerm} onChange={e => setSearchTerm(e.target.value)} placeholder="Type location..." className="w-full px-4 py-3 rounded-2xl bg-slate-50 font-bold text-xs outline-none" />
                                    </section>
                                    <section>
                                        <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-2">Sort By</label>
                                        <div className="grid grid-cols-2 gap-2">
                                            {['recent', 'distance'].map(opt => (
                                                <button key={opt} onClick={() => setSortBy(opt)} className={`py-3 rounded-xl text-[9px] font-black uppercase border transition-all ${sortBy === opt ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-400 border-slate-100'}`}>
                                                    {opt === 'recent' ? 'Newest' : 'Nearest'}
                                                </button>
                                            ))}
                                        </div>
                                    </section>
                                    <section>
                                        <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-2">Categories</label>
                                        <div className="flex flex-wrap gap-2">
                                            {['All', ...VALID_CATEGORIES].map(tag => (
                                                <button key={tag} onClick={() => setFilterTag(tag)} className={`px-4 py-2.5 rounded-xl text-[9px] font-black uppercase border transition-all ${filterTag === tag ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-400 border-slate-100'}`}>{tag}</button>
                                            ))}
                                        </div>
                                    </section>
                                    <button onClick={() => setIsFilterOpen(false)} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-[10px] shadow-lg mt-4">Show Results</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Immersive Article Modal */}
                    {isArticleOpen && viewingArticle && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/90 backdrop-blur-md" onClick={() => setIsArticleOpen(false)}></div>
                            <div className="relative bg-white w-full max-w-2xl rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                                <img src={viewingArticle.cover_photo_url} className="h-48 w-full object-cover" />
                                <div className="p-8 overflow-y-auto scrollable-list">
                                    <h2 className="text-2xl font-black uppercase tracking-tighter mb-2">{auditLocationName(viewingArticle.place_name)}</h2>
                                    <span className="inline-block bg-slate-100 text-slate-500 px-3 py-1 rounded-full text-[10px] font-bold uppercase mb-6">{viewingArticle.category}</span>
                                    <p className="text-slate-600 leading-relaxed first-letter:text-5xl first-letter:font-black first-letter:mr-2 first-letter:float-left">
                                        {viewingArticle.ai_article}
                                    </p>
                                    <button onClick={() => setIsArticleOpen(false)} className="mt-8 w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-[10px]">Back to Log</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
