// --- 4. Adventure Engine / Planner Map ---
useEffect(() => {
    if (!isPlannerOpen) {
        if (mapRef.current) {
            mapRef.current.remove();
            mapRef.current = null;
            markerRegistryRef.current = {};
        }
        return;
    }

    const timer = setTimeout(() => {
        const mapContainer = document.getElementById('planner-map');
        if (!mapContainer) return;

        // Initialize Map instance
        if (!mapRef.current) {
            mapRef.current = L.map('planner-map', { 
                zoomControl: false, 
                attributionControl: true 
            }).setView([userCoords?.lat || 7.8731, userCoords?.lng || 80.7718], 10);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap © CARTO',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(mapRef.current);
        }

        // Handle Markers
        places.forEach(place => {
            const isHovered = hoveredPlaceId === place.id;
            const isSelected = selectedRoute.find(p => p.id === place.id);
            const markerColor = isHovered ? "#3b82f6" : isSelected ? "#ef4444" : place.status === 'done' ? "#10b981" : "#f97316";

            if (!markerRegistryRef.current[place.id]) {
                const marker = L.circleMarker([place.latitude, place.longitude], {
                    radius: 6, fillColor: markerColor, color: "#fff", weight: 2, fillOpacity: 1
                }).addTo(mapRef.current);
                marker.bindTooltip(place.place_name, { direction: 'top', offset: [0, -5] });
                marker.on('click', () => setHoveredPlaceId(place.id));
                markerRegistryRef.current[place.id] = marker;
            } else {
                const marker = markerRegistryRef.current[place.id];
                marker.setStyle({ fillColor: markerColor, radius: isHovered ? 9 : 6 });
                if (isHovered || isSelected) marker.bringToFront();
            }
        });

        // Handle Routing
        const routeSignature = selectedRoute.map(p => p.id).join(',');
        if (currentRouteIdsRef.current !== routeSignature) {
            currentRouteIdsRef.current = routeSignature;

            if (selectedRoute.length > 0 && userCoords) {
                const waypoints = [
                    L.latLng(userCoords.lat, userCoords.lng),
                    ...selectedRoute.map(p => L.latLng(p.latitude, p.longitude))
                ];

                if (routingControlRef.current) {
                    routingControlRef.current.setWaypoints(waypoints);
                } else {
                    routingControlRef.current = L.Routing.control({
                        waypoints,
                        router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
                        lineOptions: { styles: [{ color: '#ef4444', weight: 6, opacity: 0.8 }] },
                        createMarker: () => null,
                        addWaypoints: false,
                        show: false,
                        fitSelectedRoutes: true
                    }).on('routesfound', (e) => {
                        setRouteDistance((e.routes[0].summary.totalDistance / 1000).toFixed(1));
                    }).addTo(mapRef.current);
                }
            } else if (routingControlRef.current) {
                mapRef.current.removeControl(routingControlRef.current);
                routingControlRef.current = null;
                setRouteDistance(0);
            }
        }
    }, 100);

    return () => clearTimeout(timer);
}, [isPlannerOpen, selectedRoute, hoveredPlaceId, places, userCoords]);

   const logVisit = async () => {

            if (sessionStorage.getItem('visit_logged') || window.location.protocol === 'file:') return;

        const toggleRoutePlace = (place) => {
    setSelectedRoute(prev => {
        // 1. Add or remove the place from the selection pool
        const isSelected = prev.find(p => p.id === place.id);
        const selectionPool = isSelected 
            ? prev.filter(p => p.id !== place.id) 
            : [...prev, place];

        if (selectionPool.length === 0) return [];
        if (!userCoords) return selectionPool; // Fallback if GPS is off

        // 2. Sequential Reordering (Nearest Neighbor)
        const optimizedRoute = [];
        let remainingOptions = [...selectionPool];
        
        // Always start the calculation from the user's current position
        let currentPoint = { lat: userCoords.lat, lng: userCoords.lng };

        while (remainingOptions.length > 0) {
            let nearestIndex = 0;
            let shortestDistance = Infinity;

            for (let i = 0; i < remainingOptions.length; i++) {
                const distance = calculateDistance(
                    currentPoint.lat, 
                    currentPoint.lng, 
                    remainingOptions[i].latitude, 
                    remainingOptions[i].longitude
                );

                if (distance < shortestDistance) {
                    shortestDistance = distance;
                    nearestIndex = i;
                }
            }

            // Move the closest location found to the optimized list
            const nextStop = remainingOptions.splice(nearestIndex, 1)[0];
            optimizedRoute.push(nextStop);

            // Update current point to the location we just "arrived" at
            currentPoint = { lat: nextStop.latitude, lng: nextStop.longitude };
        }

        return optimizedRoute;
    });
};

const handleAddPlace = async (e) => {
    e.preventDefault();

    if (!formData.latitude) {

    // 🟢 FIX 3: Duplicate Validation Logic
    const normalizedName = formData.place_name.trim().toLowerCase();
    const latFixed = parseFloat(formData.latitude).toFixed(4);
    const lngFixed = parseFloat(formData.longitude).toFixed(4);
    const formUrl = formData.map_url || "";

    const isDuplicate = places.some(p => {
        // Check Name
        const nameMatch = p.place_name && p.place_name.toLowerCase() === normalizedName;
        
        // Check Coordinates (up to 4 decimal places / ~11 meters)
        const coordMatch = p.latitude && p.longitude && 
                           parseFloat(p.latitude).toFixed(4) === latFixed && 
                           parseFloat(p.longitude).toFixed(4) === lngFixed;
        
        // Check Google Maps URL (using the specific DB column name 'google_maps_url')
        const urlMatch = formUrl && p.google_maps_url && p.google_maps_url === formUrl;

        return nameMatch || coordMatch || urlMatch;
    });

    if (isDuplicate) {
        alert("⚠️ Verification Failed: This location (Name, Coordinates, or Map Link) already exists in your Journal!");
        return; // Stops execution, preventing the database insert
    }

    // If it passes validation, submit to pending_approvals
    try {
        const { error } = await supabaseClient
            .from('pending_approvals') 
            .insert([{
                ...formData,
                status: 'pending',
                created_at: new Date().toISOString()
            }]);

        if (error) throw error;

        alert("Success! Your suggestion has been sent to the Admin for approval.");
        setisAddOpen(false);
        
        // Reset local form state
        setFormData({
            place_name: '', district: '', latitude: '', longitude: '',
            map_url: '', image_url: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b',
            status: 'pending', category: 'Waterfall'
        });

        // Clean up the yellow marker so it's fresh next time
        if (tempMarkerRef.current && addMapRef.current) {
            addMapRef.current.removeLayer(tempMarkerRef.current);
            tempMarkerRef.current = null;
        }

    } catch (err) {
        alert("Error sending request: " + err.message);
    }
};

const calculateDistance = (lat1, lon1, lat2, lon2) => {
    const R = 6371; // Radius of the earth in km
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
};

const displayPlaces = React.useMemo(() => {
    return places.filter(place => {
        const matchesStatus = place.status === statusFilter;
        const matchesCategory = filterTag === 'All' || place.category === filterTag;
        
        
        const name = (place.place_name || "").toLowerCase();
        const district = (place.district || "").toLowerCase();
        const search = (searchTerm || "").toLowerCase();
        
        const matchesSearch = name.includes(search) || district.includes(search);
        return matchesStatus && matchesCategory && matchesSearch;
    }).sort((a, b) => {
        if (sortBy === 'recent') return b.id - a.id;
        if (sortBy === 'distance' && userCoords) {
            const distA = calculateDistance(userCoords.lat, userCoords.lng, a.latitude, a.longitude);
            const distB = calculateDistance(userCoords.lat, userCoords.lng, b.latitude, b.longitude);
            return distA - distB;
        }
        return 0;
    });
}, [places, statusFilter, filterTag, searchTerm, sortBy, userCoords]);

                                        {routeDistance} KM
                                    </span>
                                )}
                                
                                {selectedRoute.length > 0 && (
                                    <button 
    onClick={() => {
        setPlannerSearch('');
        setSelectedRoute([]); // This resets the list and the map icons/lines
        setRouteDistance(0);
    }}
    className="p-2 hover:bg-slate-100 rounded-xl transition-colors text-slate-400 flex items-center gap-2 text-xs"
>
    <i data-lucide="refresh-cw" class="w-3 h-3"></i>
    Clear Route
</button>
                                )}
                            </div>
                        </div>
                        <button 
                            onClick={() => setIsPlannerOpen(false)} 
                            className="w-10 h-10 bg-slate-100 hover:bg-slate-200 rounded-full flex items-center justify-center transition-all"
                        >
                            <i data-lucide="x" className="w-5 h-5 text-slate-600"></i>
                        </button>
                    </div>

                    <div className="relative">
                        <i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input 
                            type="text"
                            placeholder="Search journal or bucket list..."
                            value={plannerSearch}
                            onChange={(e) => setPlannerSearch(e.target.value)}
                            className="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-11 pr-4 text-[10px] font-bold uppercase tracking-widest focus:ring-2 focus:ring-blue-500/20 outline-none transition-all"
                        />
                    </div>
                </div>

                {/* FIXED SIZE LOCATION LIST - Scrollable */}
                <div className="flex-1 overflow-y-auto p-4 space-y-2 custom-scrollbar bg-white">
                    {(() => {
                       const filtered = places.filter(place => {
    // NULL-SAFE PLANNER SEARCH
    const safeName = (place.place_name || "").toLowerCase();
    const safeCategory = (place.category || "").toLowerCase();
    const search = (plannerSearch || "").toLowerCase();
    
    const matchesStatus = (place.status === 'done' || place.status === 'pending');
    const matchesSearch = safeName.includes(search) || safeCategory.includes(search);
    
    return matchesStatus && matchesSearch;
});

                        if (filtered.length === 0) {
                            return (
                                <div className="flex flex-col items-center justify-center py-20 text-slate-300">
                                    <i data-lucide="map" className="w-8 h-8 mb-2 opacity-20"></i>
                                    <span className="text-[10px] font-bold uppercase tracking-widest">No matching locations</span>
                                </div>
                            );
                        }

                        return filtered.map(place => {
                            const isSelected = selectedRoute.find(p => p.id === place.id);
                            const isHighlighted = hoveredPlaceId === place.id;
                            const isPending = place.status === 'pending';
                            
                            return (
                                <div 
                                    key={place.id} 
                                    onClick={() => setHoveredPlaceId(place.id)}
                                    className={`flex items-center justify-between p-3 rounded-2xl border transition-all cursor-pointer group ${
                                        isHighlighted 
                                            ? 'border-blue-500 bg-blue-50/50 shadow-sm shadow-blue-100' 
                                            : isSelected 
                                                ? 'border-slate-900 bg-slate-50' 
                                                : 'border-slate-100 bg-white hover:border-slate-200 shadow-sm shadow-slate-100/50'
                                    }`}
                                >
                                    <div className="flex items-center gap-3 min-w-0">
                                        <div className={`w-2.5 h-2.5 rounded-full shrink-0 ${
                                            isPending 
                                                ? 'bg-orange-500 shadow-[0_0_8px_rgba(245,158,11,0.4)] animate-pulse' 
                                                : 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.4)]'
                                        }`}></div>

                                        <div className="flex flex-col min-w-0">
                                            <span className="text-[10px] font-black uppercase truncate text-slate-900">
                                                {place.place_name}
                                            </span>
                                            <span className="text-[8px] font-bold uppercase truncate text-slate-400">
                                                {isPending ? 'Bucket List' : 'Visited'} • {place.district}
                                            </span>
                                        </div>
                                    </div>
                                    
                                    <button 
                                        onClick={(e) => { 
                                            e.stopPropagation(); 
                                            toggleRoutePlace(place); 
                                        }}
                                        className={`w-8 h-8 rounded-xl flex items-center justify-center transition-all active:scale-90 ${
                                            isSelected 
                                                ? 'bg-slate-900 text-white shadow-lg shadow-slate-900/20' 
                                                : 'bg-slate-100 text-slate-400 hover:bg-slate-200 hover:text-slate-600'
                                        }`}
                                    >
                                        <i data-lucide={isSelected ? "minus" : "plus"} className="w-4 h-4"></i>
                                    </button>
                                </div>
                            );
                        });
                    })()}
                </div>

                {/* Footer Action (Fixed Height) */}
                <div className="p-4 border-t border-slate-100 bg-slate-50/50 shrink-0">
                    <button 
                        onClick={shareToWhatsApp}
                        disabled={selectedRoute.length === 0}
                        className={`w-full py-4 rounded-2xl font-black uppercase text-[10px] flex items-center justify-center gap-2 transition-all active:scale-[0.98] ${
                            selectedRoute.length > 0 
                                ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/20 hover:bg-emerald-700' 
                                : 'bg-slate-200 text-slate-400 cursor-not-allowed'
                        }`}
                    >
                        <i data-lucide="share-2" className="w-4 h-4"></i>
                        Share Trip to WhatsApp
                    </button>
                </div>
            </div>
        </div>
    </div>
)}

{isAddOpen && (
    <div className="fixed inset-0 bg-white z-[3000] flex flex-col lg:flex-row animate-in fade-in duration-300">
        {/* Map Side */}
        <div className="w-full lg:w-1/2 h-[35vh] lg:h-full bg-slate-100 relative">
            <div id="add-verification-map" className="w-full h-full"></div> 
            {/* The ID above must match the JS exactly */}
            <div className="absolute top-6 left-6 z-[3001] bg-white p-4 rounded-2xl shadow-xl border border-slate-100">
                <p className="text-[10px] font-black uppercase text-slate-400">Database Preview</p>
                <p className="text-xs font-bold">Verifying location proximity...</p>
            </div>
        </div>

        {/* Form Side */}
<div className="w-full lg:w-1/2 p-8 overflow-y-auto">
    <div className="flex justify-between items-center mb-8">
        <div>
            <h2 className="text-2xl font-black uppercase tracking-tighter">Suggest a Spot</h2>
            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Staging for Admin Review</p>
        </div>
        <button onClick={() => setisAddOpen(false)} className="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center hover:bg-slate-200">
            <i data-lucide="x" className="w-5 h-5 text-slate-500"></i>
        </button>
    </div>
    
    <form onSubmit={handleAddPlace} className="space-y-6">
        <div className="space-y-2">
            <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Location Search</label>
            <div className="relative">
                <i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                <input 
    id="location-search"
    type="text" 
    required
    placeholder="Search Google Maps..."
    onKeyDown={(e) => {
        // Prevents the form from submitting when you press Enter to select a map suggestion
        if (e.key === 'Enter') e.preventDefault(); 
    }}
    className="w-full pl-12 pr-4 py-4 rounded-2xl border border-slate-100 bg-slate-50 focus:bg-white focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all font-medium"
/>
            </div>
            <p className="text-[9px] text-slate-400 italic ml-1">Coordinates and District are fetched automatically upon selection.</p>
        </div>

        <div className="space-y-2">
            <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Category</label>
            <select 
                value={formData.category}
                onChange={(e) => setFormData({...formData, category: e.target.value})}
                className="w-full p-4 rounded-2xl border border-slate-100 bg-slate-50 outline-none font-medium appearance-none focus:ring-4 focus:ring-indigo-500/10"
            >
                {["Waterfall", "Mountain", "Trail", "Viewpoint", "Beach", "Park", "Plateaus", "Reserved Forest", "Monastery", "Archaeology", "Reservoir", "Pool", "Stream", "Location"].map(cat => (
                    <option key={cat} value={cat}>{cat}</option>
                ))}
            </select>
        </div>

        <button type="submit" className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase text-[11px] tracking-[0.2em] shadow-xl shadow-slate-900/20 hover:bg-indigo-600 transition-all active:scale-[0.98]">
            Submit Suggestion
        </button>
    </form>
</div>

    </div>
)}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
