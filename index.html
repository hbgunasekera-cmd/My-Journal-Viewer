    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SUPABASE_URL = 'https://vpslgikpaintiuayajmx.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_rsbN_QlROV14EEzYjl9dTQ_Jxl-ra44';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const DEFAULT_LOCATION = { lat: 7.0777, lng: 79.8924 };
        const VALID_CATEGORIES = ["Waterfall", "Mountain", "Trail", "Viewpoint", "Beach", "Park", "Plateaus", "Reserved Forest", "Monastery", "Archaeology", "Reservoir", "Pool", "Stream", "Location"];

        const auditLocationName = (name) => {
            if (!name) return "";
            return name.replace(/[0-9]/g, "").replace(/[^\x00-\x7F]/g, "").replace(/[^a-zA-Z\s]/g, "").replace(/\s+/g, " ").trim().toLowerCase().split(" ").map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(" ");
        };

        function App() {
            const [places, setPlaces] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterTag, setFilterTag] = useState('All');
            const [sortBy, setSortBy] = useState('recent');
            const [userCoords, setUserCoords] = useState(null);
            const [viewingArticle, setViewingArticle] = useState(null);
            const [isArticleOpen, setIsArticleOpen] = useState(false);
            const [likes, setLikes] = useState({}); 
            const [comments, setComments] = useState({}); 
            const [newCommentText, setNewCommentText] = useState('');
            const [isFilterOpen, setIsFilterOpen] = useState(false);
            const [isGalleryOpen, setIsGalleryOpen] = useState(false);
            const [galleryPhotos, setGalleryPhotos] = useState([]);
            const [isFetchingPhotos, setIsFetchingPhotos] = useState(false);
            const [accessToken, setAccessToken] = useState(null);

            useEffect(() => { initApp(); }, []);

            const initApp = async () => {
                await fetchPlaces();
                await fetchInteractions();
                getUserLocation();
                logVisit();
            };

            // Added isFilterOpen to dependency array
            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [places, searchTerm, filterTag, sortBy, isArticleOpen, comments, isFilterOpen]);

            const fetchPlaces = async () => {
                const { data } = await supabaseClient
                    .from('travel_bucket_list')
                    .select('*')
                    .eq('status', 'done')
                    .order('created_at', { ascending: false });
                setPlaces(data || []);
            };
            
const getGoogleToken = () => {
    return new Promise((resolve, reject) => {
        try {
            const client = google.accounts.oauth2.initTokenClient({
                client_id: '54611610223-6kbb79eut4gn3pogcocjj2g2fj5ohqpj.apps.googleusercontent.com',
                scope: 'https://www.googleapis.com/auth/photoslibrary.readonly',
                callback: (response) => {
                    if (response.access_token) {
                        setAccessToken(response.access_token);
                        resolve(response.access_token); // CRITICAL: This unblocks the await
                    } else {
                        reject("Failed to get access token");
                    }
                },
            });
            client.requestAccessToken({ prompt: 'select_account' });
        } catch (err) {
            reject(err);
        }
    });
};

const handleAlbumClick = async (albumUrl) => {
    if (!albumUrl) return;
    
    setIsFetchingPhotos(true); // Spinner starts
    try {
        let token = accessToken;
        if (!token) {
            token = await getGoogleToken(); // Now unblocks correctly
        }

        if (token) {
            // Clean the album ID: remove any trailing slashes or query params
            const cleanAlbumId = albumUrl.split('?')[0].split('/').filter(Boolean).pop();
            const photos = await fetchGooglePhotos(cleanAlbumId, token);
            
            if (photos && photos.length > 0) {
    setGalleryPhotos(photos);
    setIsGalleryOpen(true);
} else {
    // Alert changed to guide you to the console
    alert("Could not load photos. Press F12 and check the Console tab for the Google API error.");
}
        }
    } catch (error) {
        console.error("Auth/Gallery Error:", error);
    } finally {
        setIsFetchingPhotos(false); // Spinner stops regardless of success or failure
    }
};

      const fetchGooglePhotos = async (albumId, accessToken) => {
    try {
        const response = await fetch('https://photoslibrary.googleapis.com/v1/mediaItems:search', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${accessToken}`
            },
            body: JSON.stringify({
                albumId: albumId,
                pageSize: 100 
            })
        });

        // CRITICAL FIX: Handle non-200 responses
        if (!response.ok) {
            const errorData = await response.json();
            console.error("GOOGLE API REJECTED THE REQUEST:");
            console.error(errorData.error); // This will show you if the ID is invalid
            return null;
        }

        const data = await response.json();
        return data.mediaItems || []; // Return empty array if undefined
    } catch (error) {
        console.error("Network Error fetching photos:", error);
        return null;
    }
};



            const fetchInteractions = async () => {
                const { data: likeData, error: likeError } = await supabaseClient
                    .from('location_likes')
                    .select('location_id');

                if (likeError) {
                    console.error("Supabase Error (location_likes):", likeError.message);
                } else {
                    const likeCounts = likeData?.reduce((acc, curr) => {
                        acc[curr.location_id] = (acc[curr.location_id] || 0) + 1;
                        return acc;
                    }, {});
                    setLikes(likeCounts || {});
                }

                const { data: commentData, error: commentError } = await supabaseClient
                    .from('location_comments')
                    .select('*')
                    .order('created_at', { ascending: true });

                if (commentError) {
                    console.error("Supabase Error (location_comments):", commentError.message);
                } else {
                    const grouped = commentData?.reduce((acc, curr) => {
                        if (!acc[curr.location_id]) acc[curr.location_id] = [];
                        acc[curr.location_id].push(curr);
                        return acc;
                    }, {});
                    setComments(grouped || {});
                }
            };
            
      const getInteractionMetadata = async () => {
    const providers = [
        'https://ipapi.co/json/',
        'https://demo.ip-api.com/json/?fields=city,country',
        'https://api.db-ip.com/v2/free/self'
    ];

    for (const url of providers) {
        try {
            const response = await fetch(url);
            if (response.ok) {
                const data = await response.json();
                return {
                    city: data.city || 'Unknown',
                    // Added data.countryName to catch the DB-IP provider response
                    country: data.country_name || data.countryName || data.country || 'Unknown' 
                };
            }
        } catch (e) {
            console.warn(`Geo provider ${url} failed, trying next...`);
        }
    }
    return { city: 'Unknown', country: 'Unknown' };
};

            const handleLike = async (locationId) => {
    const meta = await getInteractionMetadata();
    const { error } = await supabaseClient
        .from('location_likes')
        .insert([{ 
            location_id: locationId,
            country: meta.country,
            city: meta.city
        }]);
    if (!error) setLikes(prev => ({ ...prev, [locationId]: (prev[locationId] || 0) + 1 }));
};

            const submitComment = async (locationId, text) => {
    const meta = await getInteractionMetadata();
    const { data, error } = await supabaseClient
        .from('location_comments')
        .insert([{ 
            location_id: locationId, 
            comment_text: text,
            country: meta.country,
            city: meta.city
        }])
        .select();

    if (error) {
        console.error("Supabase Insert Error:", error.message);
        return;
    }

    if (data && data.length > 0) {
        setComments(prev => ({
            ...prev,
            [locationId]: [...(prev[locationId] || []), data[0]]
        }));
    }
};

   const logVisit = async () => {
    if (window.location.protocol === 'file:') return;

    let geo = null;
    const providers = [
        'https://ipapi.co/json/',
        'https://demo.ip-api.com/json/?fields=city,country,region',
        'https://api.db-ip.com/v2/free/self'
    ];

    for (const url of providers) {
        try {
            const response = await fetch(url);
            if (response.ok) {
                const data = await response.json();
                geo = {
                    ip: data.ip || data.query || data.ipAddress || '',
                    // Includes countryName (DB-IP) and country_name (ipapi)
                    country: data.country_name || data.countryName || data.country || 'Unknown',
                    // Includes stateProv (DB-IP) and region_name (ipapi)
                    region: data.region_name || data.stateProv || data.region || 'Unknown',
                    city: data.city || 'Unknown'
                };
                break; 
            }
        } catch (e) {
            console.warn(`Provider ${url} failed, trying next...`);
        }
    }

    if (!geo || !geo.ip) return;

    const ua = navigator.userAgent;
    const isOwner = geo.ip.startsWith("2402:4000:b280:b2d") || 
                    ua.includes("rv:148.0") || 
                    (ua.includes("iPhone") && ua.includes("CriOS"));

    if (isOwner) return;

    await supabaseClient.from('page_visits').insert([{
        page_path: 'adventure_journal_index',
        user_agent: ua,
        country: geo.country,
        region: geo.region,
        city: geo.city,
        ip_address: geo.ip
    }]);
};

const getDeviceType = () => {
    const ua = navigator.userAgent;
    if (/(tablet|ipad|playbook|silk)|(android(?!.*mobi))/i.test(ua)) return "Tablet";
    if (/Mobile|iP(hone|od)|Android|BlackBerry|IEMobile|Kindle|NetFront|Silk-Accelerated|(hpw|web)OS|Fennec|Minimo|Opera M(obi|ini)|Blazer|Dolfin|Dolphin|Skyfire|Zune/.test(ua)) return "Mobile";
    return "Desktop";
};

            const getUserLocation = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => setUserCoords({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                        () => setUserCoords(DEFAULT_LOCATION)
                    );
                } else { setUserCoords(DEFAULT_LOCATION); }
            };

            const calculateDistance = (lat2, lon2) => {
                const ref = userCoords || DEFAULT_LOCATION;
                const R = 6371; 
                const dLat = (lat2 - ref.lat) * Math.PI / 180;
                const dLon = (lon2 - ref.lng) * Math.PI / 180;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(ref.lat * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
                return (R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)))).toFixed(1);
            };

            const filteredAndSortedPlaces = useMemo(() => {
                let filtered = [...places];
                if (searchTerm.trim() !== "") filtered = filtered.filter(p => p.place_name.toLowerCase().includes(searchTerm.toLowerCase()));
                if (filterTag !== 'All') filtered = filtered.filter(p => p.category === filterTag);
                return filtered.sort((a, b) => sortBy === 'distance' ? parseFloat(calculateDistance(a.latitude, a.longitude)) - parseFloat(calculateDistance(b.latitude, b.longitude)) : new Date(b.created_at) - new Date(a.created_at));
            }, [places, searchTerm, filterTag, sortBy, userCoords]);

            return (
                <div className="h-full flex flex-col max-w-7xl mx-auto">
                    <header className="p-4 md:px-10 md:pt-8 md:pb-4 flex justify-between items-center bg-white md:bg-transparent border-b md:border-none">
                        <div className="flex items-center gap-4">
                            <div className="p-2.5 bg-slate-900 rounded-2xl shadow-lg flex items-center justify-center">
                                <i data-lucide="compass" className="w-6 h-6 text-orange-400"></i>
                            </div>
                            <div>
                                <h1 className="text-xl md:text-3xl font-black italic text-slate-900 uppercase tracking-tighter leading-none">Adventure Log</h1>
                                <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Shared Feed</p>
                            </div>
                        </div>
                        
                        {/* Mobile Filter Toggle Button */}
                        <button 
                            onClick={() => setIsFilterOpen(!isFilterOpen)} 
                            className="flex md:hidden items-center gap-2 bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase"
                        >
                            <i data-lucide="sliders-horizontal" className="w-3 h-3 text-orange-400"></i>
                            {isFilterOpen ? 'Close' : 'Filters'}
                        </button>
                    </header>

                    {/* Dynamic visibility based on isFilterOpen state */}
                    <div className={`${isFilterOpen ? 'block' : 'hidden'} md:block bg-white p-5 mx-4 md:mx-10 rounded-3xl shadow-xl border mb-6`}>
                        <div className="flex flex-col md:flex-row gap-3 mb-4">
                            <input value={searchTerm} onChange={e => setSearchTerm(e.target.value)} placeholder="Search destinations..." className="flex-1 px-4 py-3 rounded-xl bg-slate-50 font-bold text-xs outline-none" />
                            <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="px-4 py-3 rounded-xl bg-slate-900 text-white font-black uppercase text-[9px]">
                                <option value="recent">Newest First</option>
                                <option value="distance">Nearest First</option>
                            </select>
                        </div>
                        <div className="flex flex-wrap gap-2">
                           {['All', ...VALID_CATEGORIES].map(tag => (
                                <button key={tag} onClick={() => setFilterTag(tag)} className={`px-3 py-1.5 rounded-lg text-[9px] font-black uppercase transition-all ${filterTag === tag ? 'bg-slate-900 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}`}>{tag}</button>
                            ))}
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto px-4 md:px-10 pb-20 scrollable-list">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6 pt-2">
                            {filteredAndSortedPlaces.map(place => (
                                <div key={place.id} className="group relative rounded-[2rem] bg-white border border-slate-100 overflow-hidden flex flex-col shadow-sm transition-all hover:shadow-xl">
                                    <div className="h-40 md:h-48 w-full relative bg-slate-100 overflow-hidden">
                                        {place.cover_photo_url && <img src={place.cover_photo_url} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />}
                                        <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                                        <div className="absolute bottom-3 left-4 pr-4">
                                            <h3 className="text-white text-xs md:text-sm font-extrabold uppercase tracking-tight">{auditLocationName(place.place_name)}</h3>
                                        </div>
                                    </div>
                                    
                                    <div className="p-4 flex flex-col flex-1">
                                        <div className="flex justify-between items-center mb-3 text-[8px] font-black text-slate-400 uppercase tracking-widest">
                                            <span>{calculateDistance(place.latitude, place.longitude)} KM</span>
                                            <span className="bg-slate-50 text-slate-500 px-2 py-0.5 rounded border border-slate-100">{place.category}</span>
                                        </div>

                                        <div className="flex items-center gap-4 mb-4 px-1">
                                            <button onClick={() => handleLike(place.id)} className="flex items-center gap-1.5 group transition-colors">
                                                <i data-lucide="heart" className="w-3.5 h-3.5 text-slate-300 group-hover:text-rose-500 group-hover:fill-rose-500"></i>
                                                <span className="text-[9px] font-black text-slate-400">{likes[place.id] || 0}</span>
                                            </button>
                                            <div className="flex items-center gap-1.5">
                                                <i data-lucide="message-square" className="w-3.5 h-3.5 text-slate-300"></i>
                                                <span className="text-[9px] font-black text-slate-400">{comments[place.id]?.length || 0}</span>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-3 gap-2 mt-auto">
                                            <button 
                                                onClick={() => window.open(
                                                    place.google_maps_url || `https://www.google.com/maps?q=${place.latitude},${place.longitude}`, 
                                                    '_blank'
                                                )} 
                                                className="py-2.5 rounded-xl bg-slate-50 text-slate-600 text-[8px] font-black uppercase border border-slate-100"
                                            >Maps</button>
                                            
                                            <button 
    onClick={() => handleAlbumClick(place.photo_album_url)} 
    disabled={!place.photo_album_url || isFetchingPhotos} 
    className={`py-2.5 rounded-xl text-[8px] font-black uppercase flex items-center justify-center gap-1 ${
        place.photo_album_url ? 'bg-blue-600 text-white' : 'bg-slate-50 text-slate-200 cursor-not-allowed'
    }`}
>
    {isFetchingPhotos ? <div className="w-3 h-3 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : 'Album'}
</button>
                                            
                                            {place.ai_article && <button onClick={() => { setViewingArticle(place); setIsArticleOpen(true); }} className="py-2.5 rounded-xl bg-emerald-600 text-white text-[8px] font-black uppercase">Read</button>}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {isArticleOpen && viewingArticle && (
    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4">
        <div className="absolute inset-0 bg-slate-900/90 backdrop-blur-md" onClick={() => setIsArticleOpen(false)}></div>
        <div className="relative bg-white w-full max-w-2xl rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
            <img src={viewingArticle.cover_photo_url} className="h-48 w-full object-cover" />
            <div className="p-8 overflow-y-auto scrollable-list">
                <div className="flex justify-between items-start mb-2">
                    <h2 className="text-2xl font-black uppercase tracking-tighter">{auditLocationName(viewingArticle.place_name)}</h2>
                 
                    <button 
                        onClick={() => { window.open(viewingArticle.google_maps_url || `https://www.google.com/maps/search/?api=1&query=${viewingArticle.latitude},${viewingArticle.longitude}`, '_blank'); }}
                        className="p-2 bg-slate-50 hover:bg-slate-100 rounded-xl transition-colors"
                    >
                        <i data-lucide="map-pin" className="w-4 h-4 text-slate-600"></i>
                    </button>
                </div>

                <div className="flex items-center justify-between mb-6">
                    <span className="inline-block bg-slate-100 text-slate-500 px-3 py-1 rounded-full text-[10px] font-bold uppercase">
                        {viewingArticle.category}
                    </span>
                    <button 
                        onClick={() => handleLike(viewingArticle.id)} 
                        className="flex items-center gap-2 group transition-all bg-slate-50 hover:bg-rose-50 px-4 py-2 rounded-2xl border border-slate-100"
                    >
                        <i data-lucide="heart" className={`w-4 h-4 ${likes[viewingArticle.id] ? 'text-rose-500 fill-rose-500' : 'text-slate-300'}`}></i>
                        <span className="text-xs font-black text-slate-900">{likes[viewingArticle.id] || 0}</span>
                    </button>
                </div>

                <p className="text-slate-600 leading-relaxed mb-10">{viewingArticle.ai_article}</p>

                <div className="border-t border-slate-100 pt-8">

                        Discussion ({comments[viewingArticle.id]?.length || 0})

                    <div className="space-y-4 mb-6">
                        {comments[viewingArticle.id]?.map((c, i) => (

                            placeholder="Share your thoughts..." 
                            className="w-full bg-slate-100 border-2 border-transparent focus:border-slate-900 focus:bg-white rounded-2xl px-5 py-4 text-xs font-bold transition-all outline-none pr-12"
                            onKeyDown={async (e) => {
                                if (e.key === 'Enter' && newCommentText.trim()) {
                                    const text = newCommentText;
                                    setNewCommentText('');
                                    await submitComment(viewingArticle.id, text);
                                }
                            }}
                        />
                        <button 
                            onClick={() => { if(newCommentText.trim()) submitComment(viewingArticle.id, newCommentText); setNewCommentText(''); }}
                            className="absolute right-4 top-1/2 -translate-y-1/2"
                        >
                            <i data-lucide="send" className="w-4 h-4 text-slate-400"></i>
                        </button>
                    </div>
                </div>
                <button onClick={() => setIsArticleOpen(false)} className="mt-8 w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-[10px]">Back to Log</button>
            </div>
        </div>
    </div>
)}

{isGalleryOpen && (
    <div className="fixed inset-0 z-[70] flex items-center justify-center p-4">
        <div className="absolute inset-0 bg-slate-900/95 backdrop-blur-xl" onClick={() => setIsGalleryOpen(false)}></div>
        <div className="relative bg-white w-full max-w-5xl rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
            <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                <h2 className="text-xl font-black uppercase tracking-tighter text-slate-900">Trip Gallery</h2>
                <button onClick={() => setIsGalleryOpen(false)} className="p-2 hover:bg-slate-100 rounded-full transition-colors">
                    <i data-lucide="x" className="w-6 h-6 text-slate-400"></i>
                </button>
            </div>
            
            <div className="p-6 overflow-y-auto scrollable-list flex-1 bg-slate-50">
                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                    {galleryPhotos.map((photo) => (
                        <div key={photo.id} className="aspect-square rounded-2xl overflow-hidden bg-slate-200 shadow-sm group">
                            <img 
                                src={`${photo.baseUrl}=w400-h400-c`} 
                                alt="" 
                                className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110 cursor-pointer"
                                onClick={() => window.open(photo.productUrl, '_blank')}
                            />
                        </div>
                    ))}
                </div>
            </div>
            
            <div className="p-6 bg-white">
                <button onClick={() => setIsGalleryOpen(false)} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-[10px]">Close Gallery</button>
            </div>
        </div>
    </div>
)}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
