      const auditLocationName = (name) => {
    if (!name) return "";
    // Regex breakdown:
    // [^ ... ] -> Match anything NOT in this list
    // a-zA-Z0-9 -> Keep alphanumeric
    // \s -> Keep spaces
    // \- -> Keep hyphens
    // ' -> Keep apostrophes
    // \. -> Keep dots (Added)
    return name
        .replace(/[^a-zA-Z0-9\s\-'\.]/g, '') 
        .trim();
};

const toggleRoutePlace = (place) => {
    setSelectedRoute(prev => {
        const isAlreadySelected = prev.find(p => p.id === place.id);
        let newSelection;

        // 1. Add or Remove the item first
        if (isAlreadySelected) {
            newSelection = prev.filter(p => p.id !== place.id);
        } else {
            newSelection = [...prev, place];
        }

        // 2. If 0 or 1 item, no reordering needed
        if (newSelection.length <= 1 || !userCoords) return newSelection;

        // 3. SEQUENTIAL REORDERING (Nearest Neighbor Algorithm)
        const optimizedRoute = [];
        let remainingOptions = [...newSelection];
        
        // Start from the user's current physical location
        let currentPoint = { lat: userCoords.lat, lng: userCoords.lng };

        while (remainingOptions.length > 0) {
            let nearestIndex = 0;
            let shortestDistance = Infinity;

            for (let i = 0; i < remainingOptions.length; i++) {
                const distance = calculateDistance(
                    currentPoint.lat, 
                    currentPoint.lng, 
                    remainingOptions[i].latitude, 
                    remainingOptions[i].longitude
                );

                if (distance < shortestDistance) {
                    shortestDistance = distance;
                    nearestIndex = i;
                }
            }

            // Move the nearest location found to the optimized list
            const nextStop = remainingOptions.splice(nearestIndex, 1)[0];
            optimizedRoute.push(nextStop);

            // Update current point to the location we just reached
            currentPoint = { lat: nextStop.latitude, lng: nextStop.longitude };
        }

        return optimizedRoute;
    });
};

    const calculateDistance = (lat1, lon1, lat2, lon2) => {
    const R = 6371; // km
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
};

        onClick={() => {
            if (!isFabExpanded) {
                setIsFabExpanded(true);
            } else {
                setIsPlannerOpen(true);
                setIsFabExpanded(false);
            }
        }}
        onMouseLeave={() => setIsFabExpanded(false)}
        className={`bg-slate-900 text-white shadow-2xl transition-all duration-500 ease-in-out flex items-center overflow-hidden group ${
            isFabExpanded 
                ? 'rounded-2xl px-6 py-4' 
                : 'rounded-full w-14 h-14 justify-center'
        }`}
    >
        {/* The Blinking Icon Container */}
        <div className={`flex-shrink-0 bg-orange-500 rounded-full flex items-center justify-center transition-all duration-500 ${
            isFabExpanded 
                ? 'w-8 h-8 rotate-12' 
                : 'w-10 h-10 animate-icon-highlight' 
        }`}>
            <i data-lucide="map" className={`${isFabExpanded ? 'w-4 h-4' : 'w-5 h-5'} text-white`}></i>
        </div>

        {/* Text Content */}
        <div className={`flex flex-col items-start transition-all duration-500 ease-in-out ${
            isFabExpanded ? 'ml-3 opacity-100 max-w-[200px]' : 'opacity-0 max-w-0'
        }`}>
            <span className="text-[10px] font-black uppercase tracking-tighter leading-none whitespace-nowrap">
                Adventure Engine
            </span>
            <span className="text-[8px] font-bold text-slate-400 uppercase tracking-widest leading-none mt-1 whitespace-nowrap">
                Plan Your Trip
            </span>
        </div>
    </button>
</div>
</div>
                    </header>

                    {/* Dynamic visibility based on isFilterOpen state */}
                    <div className={`${isFilterOpen ? 'block' : 'hidden'} md:block bg-white p-5 mx-4 md:mx-10 rounded-3xl shadow-xl border mb-6`}>
                        <div className="flex flex-col md:flex-row gap-3 mb-4">
                            <input value={searchTerm} onChange={e => setSearchTerm(e.target.value)} placeholder="Search destinations..." className="flex-1 px-4 py-3 rounded-xl bg-slate-50 font-bold text-xs outline-none" />
                            <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="px-4 py-3 rounded-xl bg-slate-900 text-white font-black uppercase text-[9px]">
                                <option value="recent">Newest First</option>
                                <option value="distance">Nearest First</option>
                            </select>
                        </div>
                        <div className="flex flex-wrap gap-2">
                           {['All', ...VALID_CATEGORIES].map(tag => (
                                <button key={tag} onClick={() => setFilterTag(tag)} className={`px-3 py-1.5 rounded-lg text-[9px] font-black uppercase transition-all ${filterTag === tag ? 'bg-slate-900 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}`}>{tag}</button>
                            ))}
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto px-4 md:px-10 pb-20 scrollable-list">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6 pt-2">
                            {filteredAndSortedPlaces.map(place => (
    <div key={place.id} className="group relative rounded-[2rem] bg-white border border-slate-100 overflow-hidden flex flex-col shadow-sm transition-all hover:shadow-xl">
        {/* Image Section */}
        <div className="h-40 md:h-48 w-full relative bg-slate-100 overflow-hidden">
            {place.cover_photo_url && (
                <img 
                    src={place.cover_photo_url} 
                    className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" 
                />
            )}
            <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
            <div className="absolute bottom-3 left-4 pr-4">
                <h3 className="text-white text-xs md:text-sm font-extrabold uppercase tracking-tight">
                    {auditLocationName(place.place_name)}
                </h3>
            </div>
        </div>
        
        {/* Content Section */}
        <div className="p-4 flex flex-col flex-1">
            {/* NEW: Locality & Category Row */}
            <div className="flex justify-between items-start mb-1">
                <div className="flex flex-col min-w-0">
                    <span className="text-[10px] font-black text-slate-800 uppercase tracking-tight truncate">
                        {place.locality || 'Explore'}
                    </span>
                </div>
                <span className="bg-slate-50 text-slate-500 px-2 py-0.5 rounded border border-slate-100 text-[8px] font-black uppercase shrink-0">
                    {place.category}
                </span>
            </div>

            {/* Distance Row */}
            <div className="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-3">
                {calculateDistance(place.latitude, place.longitude)} KM AWAY
            </div>

            {/* Interactions (Likes/Comments) */}
            <div className="flex items-center gap-4 mb-4 px-1">
                <button onClick={() => handleLike(place.id)} className="flex items-center gap-1.5 group transition-colors">
                    <i data-lucide="heart" className="w-3.5 h-3.5 text-slate-300 group-hover:text-rose-500 group-hover:fill-rose-500"></i>
                    <span className="text-[9px] font-black text-slate-400">{likes[place.id] || 0}</span>
                </button>
                <div className="flex items-center gap-1.5">
                    <i data-lucide="message-square" className="w-3.5 h-3.5 text-slate-300"></i>
                    <span className="text-[9px] font-black text-slate-400">{comments[place.id]?.length || 0}</span>
                </div>
            </div>

            {/* Action Buttons */}
            <div className="grid grid-cols-3 gap-2 mt-auto">
                <button 
                    onClick={() => window.open(
                        place.google_maps_url || `https://www.google.com/maps?q=${place.latitude},${place.longitude}`, 
                        '_blank'
                    )} 
                    className="py-2.5 rounded-xl bg-slate-50 text-slate-600 text-[8px] font-black uppercase border border-slate-100"
                >
                    Maps
                </button>
                
                <button 
                    onClick={() => handleAlbumClick(place.photo_album_url)} 
                    disabled={!place.photo_album_url} 
                    className={`py-2.5 rounded-xl text-[8px] font-black uppercase flex items-center justify-center gap-1 ${
                        place.photo_album_url 
                            ? 'bg-blue-600 text-white hover:bg-blue-700 transition-colors' 
                            : 'bg-slate-50 text-slate-200 cursor-not-allowed'
                    }`}
                >
                    Album
                </button>
                
                {place.ai_article && (
                    <button 
                        onClick={() => { setViewingArticle(place); setIsArticleOpen(true); }} 
                        className="py-2.5 rounded-xl bg-emerald-600 text-white text-[8px] font-black uppercase"
                    >
                        Read
                    </button>
                )}
            </div>
        </div>
    </div>
))}
                            
                        </div>
                    </div>

                    {isArticleOpen && viewingArticle && (
    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4">
        <div className="absolute inset-0 bg-slate-900/90 backdrop-blur-md" onClick={() => setIsArticleOpen(false)}></div>
        <div className="relative bg-white w-full max-w-2xl rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
            <img src={viewingArticle.cover_photo_url} className="h-48 w-full object-cover" />
            <div className="p-8 overflow-y-auto scrollable-list">
                <div className="flex justify-between items-start mb-2">
                    <h2 className="text-2xl font-black uppercase tracking-tighter">{auditLocationName(viewingArticle.place_name)}</h2>
                 
                    <button 
                        onClick={() => { window.open(viewingArticle.google_maps_url || `https://www.google.com/maps?q=${viewingArticle.latitude},${viewingArticle.longitude}`, '_blank'); }}
                        className="p-2 bg-slate-50 hover:bg-slate-100 rounded-xl transition-colors"
                    >
                        <i data-lucide="map-pin" className="w-4 h-4 text-slate-600"></i>
                    </button>
                </div>

                <div className="flex items-center justify-between mb-6">
                    <span className="inline-block bg-slate-100 text-slate-500 px-3 py-1 rounded-full text-[10px] font-bold uppercase">
                        {viewingArticle.category}
                    </span>
                    <button 
                        onClick={() => handleLike(viewingArticle.id)} 
                        className="flex items-center gap-2 group transition-all bg-slate-50 hover:bg-rose-50 px-4 py-2 rounded-2xl border border-slate-100"
                    >
                        <i data-lucide="heart" className={`w-4 h-4 ${likes[viewingArticle.id] ? 'text-rose-500 fill-rose-500' : 'text-slate-300'}`}></i>
                        <span className="text-xs font-black text-slate-900">{likes[viewingArticle.id] || 0}</span>
                    </button>
                </div>

                <p className="text-slate-600 leading-relaxed mb-10">{viewingArticle.ai_article}</p>

                <div className="border-t border-slate-100 pt-8">
                    <h4 className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4">
                        Discussion ({comments[viewingArticle.id]?.length || 0})
                    </h4>
                    
                    <div className="space-y-4 mb-6">
                        {comments[viewingArticle.id]?.map((c, i) => (
                            <div key={i} className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                <p className="text-xs text-slate-700 font-semibold mb-2">{c.comment_text}</p>
                                <div className="flex justify-between items-center">
                                    <span className="text-[8px] font-bold text-slate-400 uppercase">
                                        {new Date(c.created_at).toLocaleDateString()}
                                    </span>
                                    {(c.city || c.country) && (
                                        <span className="text-[7px] font-black text-slate-300 uppercase tracking-widest">
                                            {[c.city, c.country].filter(Boolean).join(', ')}
                                        </span>
                                    )}
                                </div>

                                {/* Inline Author Reply */}
                                {c.reply_text && (
                                    <div className="mt-4 pt-4 border-t border-slate-200/60">
                                        <div className="flex items-center gap-1.5 mb-1.5">
                                            <div className="w-1 h-3 bg-orange-400 rounded-full"></div>
                                            <span className="text-[8px] font-black text-slate-900 uppercase tracking-tighter">
                                                Author Response
                                            </span>
                                        </div>
                                        <div className="bg-white p-3 rounded-xl border border-slate-100 shadow-sm">
                                            <p className="text-[11px] text-slate-600 leading-relaxed italic">
                                                "{c.reply_text}"
                                            </p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                    
                    <div className="relative">
                        <input 
                            type="text" 
                            value={newCommentText}
                            onChange={(e) => setNewCommentText(e.target.value)}
                            placeholder="Share your thoughts..." 
                            className="w-full bg-slate-100 border-2 border-transparent focus:border-slate-900 focus:bg-white rounded-2xl px-5 py-4 text-xs font-bold transition-all outline-none pr-12"
                            onKeyDown={async (e) => {
                                if (e.key === 'Enter' && newCommentText.trim()) {
                                    const text = newCommentText;
                                    setNewCommentText('');
                                    await submitComment(viewingArticle.id, text);
                                }
                            }}
                        />
                        <button 
                            onClick={() => { if(newCommentText.trim()) submitComment(viewingArticle.id, newCommentText); setNewCommentText(''); }}
                            className="absolute right-4 top-1/2 -translate-y-1/2"
                        >
                            <i data-lucide="send" className="w-4 h-4 text-slate-400"></i>
                        </button>
                    </div>
                </div>
                <button onClick={() => setIsArticleOpen(false)} className="mt-8 w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-[10px]">Back to Log</button>
            </div>
        </div>
    </div>
)}

{/* Route Planner Modal */}
{isPlannerOpen && (
    <div className="fixed inset-0 z-[9999] flex items-center justify-center p-0 md:p-4">
        {/* Backdrop */}
        <div 
            className="absolute inset-0 bg-slate-900/95 backdrop-blur-md" 
            onClick={() => setIsPlannerOpen(false)}
        ></div>
        
        {/* Modal Container */}
        <div className="relative bg-white w-full h-full md:h-[90vh] md:max-w-6xl md:rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col md:flex-row">
            
            {/* Left Side: Map Widget */}
            <div className="h-[40vh] md:h-full md:w-2/3 bg-slate-100 relative z-0" id="planner-map"></div>

            {/* Right Side: Selection Panel */}
            <div className="flex-1 flex flex-col h-[60vh] md:h-full bg-white z-10 border-t md:border-t-0 md:border-l border-slate-100">
                
                {/* Header Section */}
                <div className="p-6 border-b border-slate-100 bg-white">
                    <div className="flex justify-between items-center mb-4">
                        <div>
                            <h2 className="text-xl font-black uppercase tracking-tighter italic">Route Planner</h2>
                            <div className="flex items-center gap-2 mt-1">
                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                    {selectedRoute.length} Stops Selected
                                </span>
                                {routeDistance > 0 && (
                                    <span className="text-[10px] font-black text-red-500 uppercase tracking-widest bg-red-50 px-2 py-0.5 rounded-lg border border-red-100 animate-pulse">
                                        {routeDistance} KM (Fastest)
                                    </span>
                                )}
                            </div>
                        </div>
                        <button 
                            onClick={() => setIsPlannerOpen(false)} 
                            className="w-10 h-10 bg-slate-100 hover:bg-slate-200 rounded-full flex items-center justify-center transition-all"
                        >
                            <i data-lucide="x" className="w-5 h-5 text-slate-600"></i>
                        </button>
                    </div>

                    {/* Location Search Bar - Nested inside Header for better layout */}
                    <div className="relative">
                        <i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input 
                            type="text"
                            placeholder="Search locations..."
                            value={plannerSearch}
                            onChange={(e) => setPlannerSearch(e.target.value)}
                            className="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-11 pr-4 text-[10px] font-bold uppercase tracking-widest focus:ring-2 focus:ring-orange-500 outline-none transition-all placeholder:text-slate-300"
                        />
                    </div>
                </div>

                {/* Scrollable Filtered Location List */}
                <div className="flex-1 overflow-y-auto p-4 scrollable-list space-y-2">
                    {(() => {
                        const filtered = places.filter(place => 
                            place.place_name.toLowerCase().includes(plannerSearch.toLowerCase()) ||
                            place.category.toLowerCase().includes(plannerSearch.toLowerCase())
                        );

                        if (filtered.length === 0) {
                            return (
                                <div className="py-12 text-center">
                                    <i data-lucide="map-pin-off" className="w-8 h-8 text-slate-200 mx-auto mb-3"></i>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                        No locations found
                                    </p>
                                </div>
                            );
                        }

                        return filtered.map(place => {
                            const isSelected = selectedRoute.find(p => p.id === place.id);
                            const isHovered = hoveredPlaceId === place.id;
                            
                            return (
                                <div 
                                    key={place.id} 
                                    onMouseEnter={() => setHoveredPlaceId(place.id)} 
                                    onMouseLeave={() => setHoveredPlaceId(null)}
                                    onClick={() => toggleRoutePlace(place)}
                                    className={`flex items-center justify-between p-3 rounded-2xl border transition-all cursor-pointer ${
                                        isSelected 
                                            ? 'border-orange-500 bg-orange-50 shadow-sm' 
                                            : isHovered 
                                                ? 'border-blue-400 bg-blue-50/50' 
                                                : 'border-slate-100 hover:bg-slate-50'
                                    }`}
                                >
                                    <div className="flex flex-col">
                                        <span className={`text-xs font-extrabold uppercase transition-colors ${
                                            isHovered ? 'text-blue-600' : 'text-slate-900'
                                        }`}>
                                            {auditLocationName(place.place_name)}
                                        </span>
                                        <span className="text-[9px] font-bold text-slate-400 uppercase">
                                            {place.category} • {calculateDistance(place.latitude, place.longitude)} KM
                                        </span>
                                    </div>
                                    
                                    <button 
                                        onClick={(e) => {
                                            e.stopPropagation(); 
                                            toggleRoutePlace(place);
                                        }}
                                        className={`w-8 h-8 rounded-full flex items-center justify-center transition-all ${
                                            isSelected 
                                                ? 'bg-orange-500 text-white shadow-lg shadow-orange-500/20' 
                                                : 'bg-slate-100 text-slate-400 hover:bg-slate-200'
                                        }`}
                                    >
                                        <i data-lucide={isSelected ? "minus" : "plus"} className="w-4 h-4"></i>
                                    </button>
                                </div>
                            );
                        });
                    })()}
                </div>

                {/* Footer / Share Action */}
                <div className="p-4 border-t border-slate-100 bg-slate-50/50">
                    <button 
                        onClick={shareToWhatsApp}
                        disabled={selectedRoute.length === 0}
                        className={`w-full py-4 rounded-2xl font-black uppercase text-[10px] flex items-center justify-center gap-2 transition-all active:scale-[0.98] ${
                            selectedRoute.length > 0 
                                ? 'bg-emerald-500 hover:bg-emerald-600 text-white shadow-lg shadow-emerald-500/30' 
                                : 'bg-slate-200 text-slate-400 cursor-not-allowed'
                        }`}
                    >
                        <i data-lucide="share-2" className="w-4 h-4"></i>
                        Share Trip to WhatsApp
                    </button>
                </div>
            </div>
        </div>
    </div>
)}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
